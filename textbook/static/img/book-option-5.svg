<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Modern Tech Book -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Book cover with rounded corners -->
  <rect x="24" y="16" width="52" height="68" rx="4" fill="url(#grad5)" stroke="#c2410c" stroke-width="2"/>

  <!-- Metallic spine effect -->
  <rect x="24" y="16" width="6" height="68" rx="4" fill="#78350f" opacity="0.5"/>

  <!-- Screen/display on cover -->
  <rect x="32" y="28" width="36" height="28" rx="2" fill="#1e293b" stroke="#0f172a" stroke-width="1"/>

  <!-- Digital display content -->
  <rect x="35" y="31" width="30" height="22" fill="#0ea5e9" opacity="0.2"/>

  <!-- Binary code pattern -->
  <text x="38" y="38" font-family="monospace" font-size="4" fill="#0ea5e9" opacity="0.8">1010</text>
  <text x="38" y="43" font-family="monospace" font-size="4" fill="#0ea5e9" opacity="0.8">0110</text>
  <text x="38" y="48" font-family="monospace" font-size="4" fill="#0ea5e9" opacity="0.8">1101</text>

  <!-- Robot head icon -->
  <rect x="42" y="62" width="16" height="14" rx="2" fill="#1e293b"/>
  <circle cx="46" cy="67" r="1.5" fill="#0ea5e9"/>
  <circle cx="54" cy="67" r="1.5" fill="#0ea5e9"/>
  <rect x="48" y="71" width="4" height="1" fill="#0ea5e9"/>

  <!-- Antenna -->
  <line x1="50" y1="62" x2="50" y2="58" stroke="#0ea5e9" stroke-width="1"/>
  <circle cx="50" cy="58" r="1.5" fill="#0ea5e9"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Simple Minimalist Book -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e8555;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5a3a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Book cover -->
  <rect x="25" y="20" width="50" height="60" rx="2" fill="url(#grad1)" stroke="#1a5a3a" stroke-width="2"/>

  <!-- Book spine highlight -->
  <rect x="25" y="20" width="5" height="60" fill="#1a5a3a" opacity="0.3"/>

  <!-- Pages -->
  <rect x="28" y="23" width="44" height="54" fill="#ffffff" opacity="0.9"/>

  <!-- Page lines -->
  <line x1="35" y1="35" x2="65" y2="35" stroke="#2e8555" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="42" x2="65" y2="42" stroke="#2e8555" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="49" x2="65" y2="49" stroke="#2e8555" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="56" x2="60" y2="56" stroke="#2e8555" stroke-width="1" opacity="0.4"/>

  <!-- AI symbol -->
  <circle cx="50" cy="65" r="6" fill="#2e8555"/>
  <text x="50" y="69" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="middle">AI</text>
</svg>
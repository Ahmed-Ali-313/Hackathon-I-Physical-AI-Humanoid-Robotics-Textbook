<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Layered Book with Depth -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Back pages (depth effect) -->
  <rect x="32" y="27" width="48" height="56" rx="2" fill="#94a3b8" opacity="0.5"/>
  <rect x="29" y="24" width="48" height="56" rx="2" fill="#cbd5e1" opacity="0.7"/>

  <!-- Main book -->
  <rect x="26" y="21" width="48" height="56" rx="2" fill="url(#grad2)" stroke="#1e40af" stroke-width="2"/>

  <!-- Book spine -->
  <rect x="26" y="21" width="6" height="56" fill="#1e40af" opacity="0.4"/>

  <!-- Pages detail -->
  <rect x="30" y="24" width="40" height="50" fill="#f8fafc" opacity="0.9"/>

  <!-- Robot head icon -->
  <rect x="45" y="42" width="16" height="16" rx="2" fill="#3b82f6" opacity="0.8"/>
  <circle cx="49" cy="48" r="1.5" fill="#ffffff"/>
  <circle cx="57" cy="48" r="1.5" fill="#ffffff"/>
  <rect x="50" y="52" width="6" height="1" fill="#ffffff"/>
  <rect x="48" y="54" width="2" height="3" fill="#ffffff"/>
  <rect x="56" y="54" width="2" height="3" fill="#ffffff"/>
</svg>